<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김애란 『비행운』 문장 필사 노트</title>
    <style>
        :root {
            --bg-color: #f4f1ea; 
            --text-color: #2c3e50;
            --accent-color: #4a69bd; 
            --border-color: #d1ccc0;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: '나눔명조', 'Nanum Myeongjo', serif;
            line-height: 1.8;
            margin: 0;
            padding: 40px 20px;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 { font-size: 2.2em; letter-spacing: 2px; margin-bottom: 10px; color: var(--accent-color); }
        .subtitle { color: #7f8c8d; font-size: 1em; }

        .user-info-section {
            text-align: center;
            background: white;
            padding: 25px;
            border-radius: 12px;
            max-width: 500px;
            margin: 0 auto 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }
        .user-info-section input {
            padding: 12px;
            font-size: 1.1em;
            width: 80%;
            border: 2px solid var(--accent-color);
            border-radius: 6px;
            text-align: center;
            outline: none;
            font-family: inherit;
            margin-bottom: 15px;
        }
        .btn-group { display: flex; justify-content: center; gap: 10px; }
        .btn-load {
            background-color: white;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn-load:hover { background-color: #f0f4ff; }

        .transcription-section {
            max-width: 1000px;
            margin: 0 auto;
        }
        .row {
            display: flex;
            gap: 40px;
            margin-bottom: 60px;
            align-items: stretch;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            position: relative;
        }
        .original-box, .writing-box {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .original-box {
            border-right: 1px dashed var(--border-color);
            padding-right: 30px;
        }
        .writing-box {
            padding-left: 10px;
        }
        .original-text {
            font-size: 1.05em;
            word-break: keep-all;
            white-space: pre-wrap; 
            flex-grow: 1;
        }
        .source-info {
            display: block;
            margin-top: 20px;
            font-size: 0.85em;
            color: #95a5a6;
            text-align: right;
            border-top: 1px dashed #eee;
            padding-top: 10px;
        }
        textarea {
            width: 100%;
            height: 100%;
            min-height: 180px;
            background: #faf9f6;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            font-family: inherit;
            font-size: 1.05em;
            line-height: 1.8;
            resize: vertical;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
            flex-grow: 1;
        }
        textarea:focus {
            background: white;
            border-color: var(--accent-color);
            box-shadow: 0 0 5px rgba(74, 105, 189, 0.2);
        }

        .save-btn {
            margin-top: 15px;
            padding: 10px 25px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-family: inherit;
            align-self: flex-end;
            transition: background 0.2s;
        }
        .
